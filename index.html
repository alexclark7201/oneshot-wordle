<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>One Shot</title>

<style>
body {
  font-family: Arial;
  background:#121213;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  padding:20px;
}

.container {
  text-align:center;
  width:100%;
  max-width:420px;
}

h1 {
  letter-spacing:3px;
}

.tiles {
  display:flex;
  justify-content:center;
  gap:8px;
  margin:20px 0;
}

.tile {
  width:52px;
  height:52px;
  border:2px solid #3a3a3c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  font-weight:bold;
  text-transform:uppercase;
}

.tile.filled {
  border-color:#565758;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1a1a1b;
  color:white;
  border:2px solid #3a3a3c;
  text-align:center;
  font-size:16px;
}

button {
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#538d4e;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#message {
  margin-top:20px;
  min-height:24px;
  font-weight:bold;
}

#winner {
  margin-top:15px;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>ONE SHOT</h1>
  <p>One guess. One word.</p>

  <div class="tiles">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>

  <!-- Hidden but usable input -->
  <input id="guessInput" maxlength="5" autocomplete="off" />
  <input id="email" placeholder="email" />

  <button onclick="submitGuess()">Submit</button>

  <div id="message"></div>
  <div id="winner"></div>
</div>

<script>
let guess = "";
let locked = false;

const tiles = document.querySelectorAll(".tile");
const input = document.getElementById("guessInput");
const msg = document.getElementById("message");

const snark = [
  "Not quite.",
  "Swing and a miss.",
  "That didn’t land.",
  "Close... but no.",
  "The word disagrees.",
  "An admirable failure."
];

/* IMPORTANT: fixes mobile typing */
document.addEventListener("click", () => input.focus());

input.addEventListener("input", (e) => {
  if (locked) return;

  guess = e.target.value.toLowerCase().slice(0, 5);
  render();
});

/* backspace + enter support */
input.addEventListener("keydown", (e) => {
  if (locked) return;

  if (e.key === "Enter") {
    submitGuess();
  }
});

function render() {
  tiles.forEach((t, i) => {
    t.textContent = guess[i] || "";
    t.classList.toggle("filled", !!guess[i]);
  });
}

async function submitGuess() {
  if (locked) return;

  const email = document.getElementById("email").value.trim();

  if (guess.length !== 5 || !email) {
    msg.innerText = "Enter a 5-letter guess and email.";
    return;
  }

  locked = true;

  const res = await fetch("/.netlify/functions/game", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, guess })
  });

  const data = await res.json();

  if (data.result === "correct") {
    msg.style.color = "#538d4e";
    msg.innerText = "Correct. Barely, but correct.";
  }

  else if (data.result === "already_used") {
    msg.style.color = "#ffb020";
    msg.innerText = "You already used your shot today.";
  }

  else {
    msg.style.color = "#e91e63";
    msg.innerText = snark[Math.floor(Math.random() * snark.length)];
  }
}
</script>

</body>
</html>
