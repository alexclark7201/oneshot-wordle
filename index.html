<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<title>One Shot</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #121213;
  overflow: hidden;

  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  -webkit-text-size-adjust: 100%;
  color: white;
}

/* CENTER SYSTEM (STABLE) */
#app {
  position: fixed;
  inset: 0;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  max-width: 420px;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

/* TYPOGRAPHY */
h1 {
  font-size: 28px;
  font-weight: 700;
  margin: 0 0 6px 0;
  letter-spacing: 0.4px;
}

p {
  font-size: 15px;
  opacity: 0.75;
  margin: 0 0 10px 0;
}

/* TILE GRID */
.tiles {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 20px 0 6px;
}

.tile {
  width: 54px;
  height: 54px;

  border: 1.5px solid #3a3a3c;
  border-radius: 8px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 20px;
  font-weight: 600;
  text-transform: uppercase;
}

.correct { background:#538d4e; border-color:#538d4e; }
.present { background:#b59f3b; border-color:#b59f3b; }
.absent  { background:#3a3a3c; border-color:#3a3a3c; }

/* 👇 NEW UX HELP TEXT */
.hint {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 6px;
  margin-bottom: 6px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  font-size: 17px;
  background: rgba(28,28,30,0.95);
  border: 1px solid rgba(72,72,74,0.6);
  color: white;

  text-align: center;
  border-radius: 10px;
  outline: none;
  box-sizing: border-box;
}

/* IMPORTANT: makes focus obvious */
input:focus {
  border-color: #538d4e;
  box-shadow: 0 0 0 2px rgba(83,141,78,0.25);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  font-size: 17px;
  font-weight: 600;

  background: #538d4e;
  border: none;
  color: white;
  border-radius: 10px;
  box-sizing: border-box;
}

/* MESSAGE */
#message {
  margin-top: 14px;
  min-height: 20px;
  font-size: 14px;
  opacity: 0.9;
}

/* ANIMATIONS */
.shake {
  animation: shake 0.35s ease;
}

@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
}

.flip {
  animation: flip 0.45s ease;
}

@keyframes flip {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}

</style>
</head>

<body>

<div id="app">
  <div class="container">

    <h1>ONE SHOT</h1>
    <p>One guess. Make it count.</p>

    <div class="tiles" id="tiles">
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
    </div>

    <!-- 👇 NEW GUIDANCE -->
    <div class="hint">Tap the box below and type your guess</div>

    <input id="guess"
           maxlength="5"
           autocomplete="off"
           autocapitalize="none"
           placeholder="Type 5-letter word" />

    <input id="email" placeholder="email address" />

    <button id="submitBtn">Submit</button>

    <div id="message"></div>

    <button id="shareBtn" style="display:none;">Share Result</button>

  </div>
</div>

<script>

const tiles = [...document.querySelectorAll(".tile")];
const guessInput = document.getElementById("guess");
const emailInput = document.getElementById("email");
const msg = document.getElementById("message");
const btn = document.getElementById("submitBtn");
const shareBtn = document.getElementById("shareBtn");

let guess = "";
let locked = false;
let lastResult = null;
let evaluation = null;

/* AUTO FOCUS */
window.addEventListener("load", () => {
  setTimeout(() => guessInput.focus(), 250);
});

/* INPUT HANDLING */
guessInput.addEventListener("input", () => {
  guess = guessInput.value
    .toLowerCase()
    .replace(/[^a-z]/g, "")
    .slice(0,5);

  guessInput.value = guess;
  render();

  if (navigator.vibrate) navigator.vibrate(5);
});

function render() {
  tiles.forEach((t,i) => t.textContent = guess[i] || "");
}

/* SHAKE */
function shake() {
  tiles.forEach(t => {
    t.classList.add("shake");
    setTimeout(() => t.classList.remove("shake"), 350);
  });
}

/* REVEAL */
function reveal(arr) {
  tiles.forEach((t,i) => {
    setTimeout(() => {
      t.classList.add("flip");
      setTimeout(() => t.classList.add(arr[i]), 200);
    }, i * 170);
  });
}

/* SUBMIT */
btn.addEventListener("click", submit);

async function submit() {
  if (locked) return;

  const email = emailInput.value.trim();

  if (guess.length !== 5 || !email) {
    msg.textContent = "Enter 5 letters + email.";
    shake();
    return;
  }

  locked = true;
  btn.disabled = true;
  guessInput.blur();

  try {
    const res = await fetch("/.netlify/functions/game", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, guess })
    });

    const data = await res.json();

    if (data.result === "already_used") {
      msg.textContent = "Already used today.";
      return;
    }

    lastResult = data.result;
    evaluation = data.evaluation;

    msg.textContent = data.result === "correct"
      ? "Correct."
      : "Wrong.";

    reveal(evaluation);

    shareBtn.style.display = "block";

  } catch (e) {
    msg.textContent = "Error submitting guess.";
  }
}

/* SHARE */
shareBtn.addEventListener("click", async () => {

  const isWin = lastResult === "correct";

  const grid = evaluation
    .map(e =>
      e === "correct" ? "🟩" :
      e === "present" ? "🟨" : "⬛"
    )
    .join("");

  const text =
`One Shot
${isWin ? "1/1" : "0/1"}

${grid}

https://iridescent-pavlova-31bf43.netlify.app`;

  await navigator.clipboard.writeText(text);

  shareBtn.textContent = "Copied!";
  setTimeout(() => shareBtn.textContent = "Share Result", 1200);
});

</script>

</body>
</html>
