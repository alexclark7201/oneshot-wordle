<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>One Shot</title>

<style>
body {
  font-family: Arial;
  background:#121213;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:20px;
}

.container {
  text-align:center;
  width:100%;
  max-width:420px;
}

h1 {
  letter-spacing:3px;
}

.tiles {
  display:flex;
  justify-content:center;
  gap:8px;
  margin:20px 0;
}

.tile {
  width:52px;
  height:52px;
  border:2px solid #3a3a3c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  font-weight:bold;
  text-transform:uppercase;
}

.tile.filled {
  border-color:#565758;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1a1a1b;
  color:white;
  border:2px solid #3a3a3c;
  text-align:center;
  font-size:16px;
  box-sizing:border-box;
}

button {
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#538d4e;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#message {
  margin-top:20px;
  min-height:24px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>ONE SHOT</h1>
  <p>One guess. One word.</p>

  <div class="tiles" id="tiles">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>

  <!-- REAL INPUT (hidden visually but active) -->
  <input id="guessInput" maxlength="5" autocomplete="off" />
  <input id="email" placeholder="email" />

  <button onclick="submitGuess()">Submit</button>

  <div id="message"></div>
</div>

<script>
let guess = "";
let locked = false;

const tiles = document.querySelectorAll(".tile");
const guessInput = document.getElementById("guessInput");
const emailInput = document.getElementById("email");
const msg = document.getElementById("message");
const tileArea = document.getElementById("tiles");

/* ONLY focus guess input when clicking tiles */
tileArea.addEventListener("click", () => {
  guessInput.focus();
});

/* typing handler */
guessInput.addEventListener("input", (e) => {
  if (locked) return;

  guess = e.target.value.toLowerCase().slice(0, 5);
  render();
});

/* enter submits */
guessInput.addEventListener("keydown", (e) => {
  if (locked) return;
  if (e.key === "Enter") submitGuess();
});

function render() {
  tiles.forEach((t, i) => {
    t.textContent = guess[i] || "";
    t.classList.toggle("filled", !!guess[i]);
  });
}

async function submitGuess() {
  if (locked) return;

  const email = emailInput.value.trim();

  if (guess.length !== 5 || !email) {
    msg.innerText = "Enter a 5-letter word + email.";
    return;
  }

  locked = true;

  const res = await fetch("/.netlify/functions/game", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, guess })
  });

  const data = await res.json();

  if (data.result === "correct") {
    msg.style.color = "#538d4e";
    msg.innerText = "Correct.";
  } 
  else if (data.result === "already_used") {
    msg.style.color = "#ffb020";
    msg.innerText = "Already used your shot today.";
  } 
  else {
    msg.style.color = "#e91e63";
    msg.innerText = "Incorrect.";
  }
}
</script>

</body>
</html>
