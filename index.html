<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<title>One Shot</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #121213;
  overflow: hidden;

  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
  color: white;
}

/* CENTER SYSTEM */
#app {
  position: fixed;
  inset: 0;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  max-width: 420px;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
}

/* TEXT */
h1 {
  font-size: 28px;
  margin: 0 0 6px 0;
}

p {
  font-size: 15px;
  opacity: 0.75;
  margin: 0 0 10px 0;
}

/* GRID */
.tiles {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 20px 0 6px;
}

.tile {
  width: 54px;
  height: 54px;
  border: 1.5px solid #3a3a3c;
  border-radius: 8px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 20px;
  font-weight: 600;
  text-transform: uppercase;
}

.correct { background:#538d4e; border-color:#538d4e; }
.present  { background:#b59f3b; border-color:#b59f3b; }
.absent   { background:#3a3a3c; border-color:#3a3a3c; }

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  font-size: 17px;
  background: rgba(28,28,30,0.95);
  border: 1px solid rgba(72,72,74,0.6);
  color: white;

  text-align: center;
  border-radius: 10px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  font-size: 17px;
  font-weight: 600;

  background: #538d4e;
  border: none;
  color: white;

  border-radius: 10px;
  box-sizing: border-box;
}

/* MESSAGE */
#message {
  margin-top: 14px;
  font-size: 14px;
  min-height: 20px;
  opacity: 0.9;
}

/* SHARE */
#shareBtn {
  margin-top: 10px;
  display: none;
}

/* ANIMATIONS */
.shake { animation: shake 0.35s ease; }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
}

.flip { animation: flip 0.45s ease; }

@keyframes flip {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}

</style>
</head>

<body>

<div id="app">
  <div class="container">

    <h1>ONE SHOT</h1>
    <p>One guess. Make it count.</p>

    <div class="tiles" id="tiles">
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
    </div>

    <input id="guess" maxlength="5" autocapitalize="none" autocomplete="off" />
    <input id="email" placeholder="email address" />

    <button id="submitBtn">Submit</button>

    <div id="message"></div>

    <button id="shareBtn">Share Result</button>

    <div id="leaderboard" style="
margin-top:20px;
text-align:left;
max-height:220px;
overflow-y:auto;
border-top:1px solid #3a3a3c;
padding-top:12px;
">
  <div style="font-weight:600;margin-bottom:10px;">
    Leaderboard
  </div>
  <div id="leaderboardEntries">
    Loading...
  </div>
</div>

  </div>
</div>

<script>

const tiles = [...document.querySelectorAll(".tile")];
const guessInput = document.getElementById("guess");
const emailInput = document.getElementById("email");
const msg = document.getElementById("message");
const btn = document.getElementById("submitBtn");
const shareBtn = document.getElementById("shareBtn");
const leaderboardEntries = document.getElementById("leaderboardEntries");

let guess = "";
let locked = false;
let evaluation = null;
let lastResult = null;

window.addEventListener("load", () => {
  setTimeout(() => guessInput.focus(), 250);
});

guessInput.addEventListener("input", () => {

  guess = guessInput.value
    .toLowerCase()
    .replace(/[^a-z]/g, "")
    .slice(0,5);

  guessInput.value = guess;

  render();
});

function render() {
  tiles.forEach((t,i) => t.textContent = guess[i] || "");
}

function shake() {
  tiles.forEach(t => {
    t.classList.add("shake");

    setTimeout(() => {
      t.classList.remove("shake");
    }, 350);
  });
}

function reveal(arr) {

  tiles.forEach((t,i) => {

    setTimeout(() => {

      t.classList.add("flip");

      setTimeout(() => {
        t.classList.add(arr[i]);
      }, 200);

    }, i * 170);

  });

}

btn.addEventListener("click", submit);

async function submit() {

  if (locked) return;

  const email = emailInput.value.trim();

  if (guess.length !== 5 || !email) {
    msg.textContent = "Enter 5 letters + email.";
    shake();
    return;
  }

  locked = true;
  btn.disabled = true;
  guessInput.blur();

  try {

    const res = await fetch("/.netlify/functions/game", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, guess })
    });

    const data = await res.json();

    console.log("GAME ENGINE RESPONSE:", data);

    evaluation = data.evaluation;

    msg.textContent = data.message || "";

    if (data.score !== undefined) {
      msg.textContent += ` (+${data.score})`;
    }

    lastResult = data.isCorrect ? "correct" : "wrong";

    if (evaluation) reveal(evaluation);

    shareBtn.style.display = "block";

    loadLeaderboard();

    if (data.gameLocked || data.isCorrect) {

      locked = true;
      btn.disabled = true;
      guessInput.disabled = true;

    } else {

      locked = false;
      btn.disabled = false;

    }

  } catch (e) {

    console.error(e);

    msg.textContent = "Error submitting guess.";

    locked = false;
    btn.disabled = false;
  }
}

shareBtn.addEventListener("click", async () => {

  const isWin = lastResult === "correct";

  const grid = evaluation
    .map(e =>
      e === "correct"
        ? "🟩"
        : e === "present"
          ? "🟨"
          : "⬛"
    )
    .join("");

  const text =
`One Shot
${isWin ? "1/1" : "0/1"}

${grid}

https://iridescent-pavlova-31bf43.netlify.app`;

  await navigator.clipboard.writeText(text);

  shareBtn.textContent = "Copied!";

  setTimeout(() => {
    shareBtn.textContent = "Share Result";
  }, 1200);

});

async function loadLeaderboard() {

  if (!leaderboardEntries) return;

  try {

    const res =
      await fetch("/.netlify/functions/leaderboard");

    const data = await res.json();

    leaderboardEntries.innerHTML = "";

    data.forEach((player, index) => {

      const row = document.createElement("div");

      row.style.display = "flex";
      row.style.justifyContent = "space-between";
      row.style.padding = "4px 0";

      row.innerHTML = `
        <span>${index + 1}. ${player.username}</span>
        <span>${player.score}</span>
      `;

      leaderboardEntries.appendChild(row);

    });

  } catch (err) {

    console.error(err);

    if (leaderboardEntries) {
      leaderboardEntries.textContent =
        "Failed to load leaderboard.";
    }

  }
}

async function checkGameStatus() {

  try {

    const res =
      await fetch("/.netlify/functions/game-status");

    const data = await res.json();

    if (!data.solved) return;

    const answer =
      (data.answer || "").toUpperCase();

    // Fill tiles with answer
    tiles.forEach((tile, i) => {

      tile.textContent = answer[i] || "";

      tile.classList.remove(
        "correct",
        "present",
        "absent"
      );

      tile.classList.add("correct");

    });

    // Hide game controls
    guessInput.style.display = "none";
    emailInput.style.display = "none";
    btn.style.display = "none";
    shareBtn.style.display = "none";

    // Update subtitle
    const subtitle =
      document.querySelector("p");

    if (subtitle) {
      subtitle.textContent =
        "Today's puzzle has been solved.";
    }

    // Winner display
    msg.innerHTML = `
      <div style="
        text-align:center;
        margin-top:10px;
      ">
        <div style="
          font-size:14px;
          opacity:.8;
        ">
          🏆 Today's Winner
        </div>

        <div style="
          font-size:28px;
          font-weight:700;
          margin-top:8px;
        ">
          ${data.winner}
        </div>
      </div>
    `;

  } catch (err) {

    console.error(err);

  }

}
  
loadLeaderboard();
 checkGameStatus(); 

</script>


</body>
</html>
