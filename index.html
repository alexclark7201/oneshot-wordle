<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>One Shot</title>

<style>
body {
  font-family: Arial;
  background:#121213;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container {
  text-align:center;
  width:100%;
  max-width:420px;
  padding:20px;
}

.tiles {
  display:flex;
  justify-content:center;
  gap:8px;
  margin:20px 0;
}

.tile {
  width:52px;
  height:52px;
  border:2px solid #3a3a3c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  font-weight:bold;
  text-transform:uppercase;
}

.tile.filled {
  border-color:#565758;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1a1a1b;
  color:white;
  border:2px solid #3a3a3c;
  text-align:center;
}

button {
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#538d4e;
  border:none;
  color:white;
  font-weight:bold;
}

#message {
  margin-top:20px;
  min-height:24px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>ONE SHOT</h1>
  <p>One guess. One word.</p>

  <div class="tiles">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>

  <input id="guess" maxlength="5" />
  <input id="email" placeholder="email" />

  <button onclick="submitGuess()">Submit</button>

  <div id="message"></div>
</div>

<script>
let guess = "";
const tiles = document.querySelectorAll(".tile");
const msg = document.getElementById("message");

document.getElementById("guess").addEventListener("input", e => {
  guess = e.target.value.toLowerCase().slice(0,5);
  tiles.forEach((t,i)=>{
    t.textContent = guess[i] || "";
    t.classList.toggle("filled", !!guess[i]);
  });
});

async function submitGuess() {
  const email = document.getElementById("email").value;

  const res = await fetch("/.netlify/functions/game", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, guess })
  });

  const data = await res.json();

  if (data.result === "correct") {
    msg.innerText = "Correct.";
  } else if (data.result === "already_used") {
    msg.innerText = "Already used today.";
  } else {
    msg.innerText = "Incorrect.";
  }
}
</script>

</body>
</html>
