<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>One Shot</title>

<style>
body {
  margin:0;
  height:100vh;
  display:grid;
  place-items:center;
  background:#121213;
  color:white;
  font-family:Arial;
}

.container { text-align:center; width:100%; max-width:420px; }

.tiles {
  display:flex;
  justify-content:center;
  gap:8px;
  margin:20px 0;
}

.tile {
  width:52px;
  height:52px;
  border:2px solid #3a3a3c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  text-transform:uppercase;
  transition:0.3s;
}

.correct { background:#538d4e; border-color:#538d4e; }
.present { background:#b59f3b; border-color:#b59f3b; }
.absent { background:#3a3a3c; border-color:#3a3a3c; }

input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1a1a1b;
  color:white;
  border:2px solid #3a3a3c;
  text-align:center;
}

button { background:#538d4e; cursor:pointer; }

#message { margin-top:15px; min-height:20px; }

.shake { animation:shake 0.4s; }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
  75%{transform:translateX(-5px)}
}
</style>
</head>

<body>

<div class="container">

<h1>ONE SHOT</h1>

<div class="tiles" id="tiles">
  <div class="tile"></div>
  <div class="tile"></div>
  <div class="tile"></div>
  <div class="tile"></div>
  <div class="tile"></div>
</div>

<input id="guess" maxlength="5" />
<input id="email" placeholder="email" />
<button onclick="submitGuess()">Submit</button>

<div id="message"></div>
<button id="shareBtn" style="display:none">Share</button>

</div>

<script>
const tiles = [...document.querySelectorAll(".tile")];
const guessInput = document.getElementById("guess");
const emailInput = document.getElementById("email");
const msg = document.getElementById("message");
const shareBtn = document.getElementById("shareBtn");

let last = null;
let evaluation = null;

guessInput.addEventListener("input", () => {
  guessInput.value = guessInput.value.toLowerCase().slice(0,5);
  render();
});

function render(){
  const g = guessInput.value;
  tiles.forEach((t,i)=>t.textContent=g[i]||"");
}

function shake(){
  tiles.forEach(t=>{
    t.classList.add("shake");
    setTimeout(()=>t.classList.remove("shake"),400);
  });
}

async function submitGuess(){
  const email = emailInput.value;
  const guess = guessInput.value;

  if(guess.length!==5){
    msg.textContent="5 letters only";
    shake();
    return;
  }

  const res = await fetch("/.netlify/functions/game",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({email,guess})
  });

  const data = await res.json();

  if(data.result==="already_used"){
    msg.textContent="Already used today.";
    return;
  }

  last = data.result;
  evaluation = data.evaluation;

  tiles.forEach((t,i)=>{
    setTimeout(()=>{
      t.classList.add(evaluation[i]);
    },i*200);
  });

  msg.textContent = data.result==="correct"
    ? "Correct."
    : "Wrong.";

  shareBtn.style.display="block";
}

shareBtn.onclick = async () => {
  const isWin = last==="correct";

  const grid = evaluation
    ? evaluation.map(e =>
        e==="correct"?"🟩":
        e==="present"?"🟨":"⬛"
      ).join("")
    : "⬛⬛⬛⬛⬛";

  const text =
`One Shot
${isWin?"1/1":"0/1"}

${grid}

https://iridescent-pavlova-31bf43.netlify.app`;

  await navigator.clipboard.writeText(text);
  shareBtn.textContent="Copied!";
  setTimeout(()=>shareBtn.textContent="Share",1500);
};
</script>

</body>
</html>
